<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slip Screener - ตรวจสอบสลิปแบบกลุ่ม (Batch)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="index.css">
    
    <!-- External Libraries -->
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- jsQR for QR Code scanning -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo-container">
                <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h1>ระบบคัดกรองสลิปเบื้องต้น</h1>
            <p>อัปโหลดโฟลเดอร์ที่มีสลิปโอนเงินหลายๆ ใบ เพื่อประมวลผลพร้อมกัน</p>
        </header>

        <section class="upload-section">
            <div class="upload-actions">
                <!-- Single file upload (fallback) -->
                <input type="file" id="file-input" accept="image/*" multiple hidden>
                <label for="file-input" class="btn btn-outline">
                    เลือกรูปภาพ
                </label>

                <!-- Folder upload -->
                <input type="file" id="folder-input" webkitdirectory directory multiple hidden>
                <label for="folder-input" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    เลือกทั้งโฟลเดอร์
                </label>
            </div>
            
            <div id="drop-zone" class="drop-zone">
                <p>หรือลากไฟล์ / โฟลเดอร์มาวางที่นี่</p>
            </div>
        </section>

        <!-- Progress Bar (Batch) -->
        <div id="batch-progress-container" class="hidden">
            <div class="progress-header">
                <span id="progress-text">กำลังเตรียมการ...</span>
                <span id="progress-count">0 / 0</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Hidden canvas for image processing -->
        <canvas id="processing-canvas" hidden></canvas>

        <!-- Results Table -->
        <section class="result-section hidden" id="result-section">
            <div class="table-container">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>ภาพสลิป</th>
                            <th>ข้อมูลสำคัญ (วันที่/เงิน)</th>
                            <th>ผู้โอน ➜ ผู้รับ</th>
                            <th>ผลการคัดกรอง</th>
                        </tr>
                    </thead>
                    <tbody id="results-tbody">
                        <!-- Rows will be dynamically injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
